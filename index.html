<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Birthday Surprise ❤️</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#E9D5FF,#D8B4FE,#C084FC,#A855F7);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* Password Screen */

#passwordScreen{

position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
background:linear-gradient(135deg,#E9D5FF,#C084FC,#A855F7);

}


.passwordBox{

background:white;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);

}


.passwordBox h2{

font-family:'Pacifico',cursive;
color:#9333EA;
margin-bottom:20px;

}


.passwordBox input{

padding:12px;
width:230px;
border:2px solid #C084FC;
border-radius:20px;
outline:none;
text-align:center;

}


.passwordBox button{

margin-top:15px;
padding:12px 30px;
border:none;
border-radius:25px;
background:#9333EA;
color:white;
cursor:pointer;

}


#error{

color:red;
margin-top:10px;

}


/* Main Page */

#main{

display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;

}


.title{

font-size:45px;
font-family:'Pacifico',cursive;

}


.subtitle{

margin-top:15px;
font-size:18px;

}


.heart{

position:absolute;
bottom:-50px;
font-size:30px;
animation:float 8s linear infinite;

}


@keyframes float{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-120vh);
}

}

</style></head><body><div id="passwordScreen"><div class="passwordBox"><h2>Private Surprise 💜</h2><input type="password" id="pass" placeholder="Enter Password"><br><button onclick="checkPassword()">
Open Surprise 🎁
</button><p id="error"></p></div></div><div id="main"><div class="title">
Birthday Surprise ❤️
</div><div class="subtitle">
Something Magical Is Coming ✨
</div></div><span class="heart" style="left:10%">💜</span>
<span class="heart" style="left:30%;animation-delay:1s">💖</span>
<span class="heart" style="left:50%;animation-delay:2s">✨</span>
<span class="heart" style="left:70%;animation-delay:3s">🌸</span>
<span class="heart" style="left:90%;animation-delay:4s">💜</span>

<script>

function checkPassword(){

let password=document.getElementById("pass").value;


if(password==="vishiforever1326"){

document.getElementById("passwordScreen").style.display="none";

document.getElementById("main").style.display="flex";

}

else{

document.getElementById("error").innerHTML="Wrong Password ❌";

}

}

</script></body>
</html>
