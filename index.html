<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
overflow:hidden;
}

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff0080,#7928ca);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

.loader{
width:220px;
height:10px;
background:rgba(255,255,255,.3);
border-radius:30px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:white;
animation:load 3s linear forwards;
}

@keyframes load{
100%{
width:100%;
}
}

h1{
font-size:35px;
}

p{
margin-top:10px;
font-size:18px;
}
</style>
</head>

<body>

<div id="loading">
<h1>🎉 Birthday Surprise</h1>
<p>Preparing Something Special...</p>

<div class="loader">
<div class="bar"></div>
</div>

</div>

<script>
setTimeout(function(){
alert("Loading Complete!");
},3000);
</script>

</body>
</html>
